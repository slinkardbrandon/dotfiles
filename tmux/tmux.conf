# Remap prefix to Ctrl+a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# True color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",alacritty:RGB,xterm-256color:RGB"

# Enable mouse
set -g mouse on

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Intuitive splits (open in current path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with vim keys
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Fast window switching
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5

# Reduce escape delay (important for neovim)
set -sg escape-time 0

# Increase history
set -g history-limit 50000

# Activity monitoring
setw -g monitor-activity off
set -g visual-activity off

# Status bar (Tokyo Night)
set -g status-position bottom
set -g status-style "bg=#1a1b26,fg=#c0caf5"
set -g status-left "#[fg=#1a1b26,bg=#7aa2f7,bold] #S #[bg=#1a1b26] "
set -g status-right "#[fg=#c0caf5] %H:%M #[fg=#1a1b26,bg=#7aa2f7,bold] #h "
set -g status-left-length 30

# Window status (Tokyo Night)
setw -g window-status-format " #I:#W "
setw -g window-status-current-format "#[fg=#1a1b26,bg=#7dcfff,bold] #I:#W "

# Pane borders (Tokyo Night)
set -g pane-border-style "fg=#33467c"
set -g pane-active-border-style "fg=#7aa2f7"

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Copy mode with vim keys
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
