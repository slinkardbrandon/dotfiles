# Use fish as default shell
# Convention: all bindings should have both a prefix (C-a) and Meta (Alt/Option) variant
set -g default-command fish

# Remap prefix to Ctrl+a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# True color support
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB:usstyle"

# Enable mouse
set -g mouse on

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Intuitive splits (open in current path)
bind | split-window -h -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind v split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window/tab in current path
bind c new-window -c "#{pane_current_path}"
bind t new-window -c "#{pane_current_path}"

# Kill pane without confirmation
bind x kill-pane
bind -n M-x kill-pane

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with vim keys
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Toggle terminal popup (like VS Code Ctrl+`)
bind -n M-` if-shell -F '#{==:#{session_name},popup}' \
  'detach-client' \
  'display-popup -d "#{pane_current_path}" -w 90% -h 40% -E "tmux new -As popup"'
bind -n C-@ if-shell -F '#{==:#{session_name},popup}' \
  'detach-client' \
  'display-popup -d "#{pane_current_path}" -w 90% -h 40% -E "tmux new -As popup"'

# Pane splits — no prefix needed
bind -n M-\\ split-window -h -c "#{pane_current_path}"
bind -n M-- split-window -v -c "#{pane_current_path}"

# Smart pane navigation — shared with vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind -n M-h if-shell "$is_vim" "send-keys M-h" "select-pane -L"
bind -n M-j if-shell "$is_vim" "send-keys M-j" "select-pane -D"
bind -n M-k if-shell "$is_vim" "send-keys M-k" "select-pane -U"
bind -n M-l if-shell "$is_vim" "send-keys M-l" "select-pane -R"
bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"

# Toggle Claude chat popup
bind -n M-c if-shell -F '#{==:#{session_name},ai}' \
  'detach-client' \
  'display-popup -d "#{pane_current_path}" -x R -y 0 -w 40% -h 100% -E "tmux new -As ai \"$(command -v claude >/dev/null && echo claude || echo copilot)\""'

# Display pane numbers — no prefix needed
bind -n M-q display-panes
bind -n C-q display-panes

# Direct Meta (Option) key binds — no prefix needed
bind -n M-t new-window -c "#{pane_current_path}"
bind -n M-w kill-window
bind -n M-n next-window
bind -n M-p previous-window
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5

# Reduce escape delay (important for neovim)
set -sg escape-time 0

# Increase history
set -g history-limit 50000

# Activity monitoring
setw -g monitor-activity off
set -g visual-activity off

# Status bar (Tokyo Night)
set -g status-position top
set -g status-style "bg=#1a1b26,fg=#c0caf5"
set -g status-left "#[fg=#1a1b26,bg=#7aa2f7,bold] #S #[bg=#1a1b26] "
set -g status-right "#[fg=#c0caf5] %H:%M #[fg=#1a1b26,bg=#7aa2f7,bold] #h "
set -g status-left-length 30

# Window status (Tokyo Night)
setw -g window-status-separator ""
setw -g window-status-format "#[fg=#a9b1d6,bg=#3b2d5e]  #I:#W  "
setw -g window-status-current-format "#[fg=#1a1b26,bg=#bb9af7,bold]  #I:#W  "

# Single row status bar
set -g status on

# Pane borders (Tokyo Night)
set -g pane-border-style "fg=#33467c"
set -g pane-active-border-style "fg=#7aa2f7"

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"
bind -n M-r source-file ~/.tmux.conf \; display "Config reloaded"

# Copy mode with vim keys
bind Escape copy-mode
bind -n M-Escape copy-mode
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection

# Copy to system clipboard (platform-aware)
if-shell "uname -r | grep -qi microsoft" \
  "bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'clip.exe'" \
  "if-shell 'command -v pbcopy' \
    'bind -T copy-mode-vi y send -X copy-pipe-and-cancel pbcopy' \
    'bind -T copy-mode-vi y send -X copy-pipe-and-cancel xclip -selection clipboard'"

# Plugins (TPM)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-open'

# Resurrect settings — persist layout & directories, not programs
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-processes 'false'

# Continuum — auto-save every 15 min, auto-restore on tmux start
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Auto-install TPM if not present, then initialize
if-shell "test ! -d ~/.tmux/plugins/tpm" \
  "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"
run '~/.tmux/plugins/tpm/tpm'
