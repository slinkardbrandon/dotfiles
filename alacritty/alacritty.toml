# Alacritty Configuration

# Window settings
[window]
option_as_alt = "Both"
opacity = 0.95
blur = true

# Font settings
[font]
size = 18.0
normal = { family = "FiraCode Nerd Font Mono", style = "Regular" }
bold = { family = "FiraCode Nerd Font Mono", style = "Bold" }
italic = { family = "FiraCode Nerd Font Mono", style = "Italic" }
bold_italic = { family = "FiraCode Nerd Font Mono", style = "Bold Italic" }

# Tokyo Night colors
[colors]
draw_bold_text_with_bright_colors = true

[colors.primary]
background = '#1a1b26'
foreground = '#c0caf5'

[colors.cursor]
text = '#1a1b26'
cursor = '#c0caf5'

[colors.vi_mode_cursor]
text = '#1a1b26'
cursor = '#c0caf5'

[colors.selection]
text = '#c0caf5'
background = '#33467c'

[colors.search.matches]
foreground = '#1a1b26'
background = '#7aa2f7'

[colors.footer_bar]
background = '#33467c'
foreground = '#c0caf5'

[colors.hints.start]
foreground = '#1a1b26'
background = '#7aa2f7'

[colors.hints.end]
foreground = '#7aa2f7'
background = '#33467c'

[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\u001B\r"
